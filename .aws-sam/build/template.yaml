AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: S3 upload Lambda with DevOps Agent auto-investigation
Parameters:
  EnableUpload:
    Type: String
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
    Description: Set to 'true' to enable S3 uploads, 'false' to disable (triggers
      LOG-ERROR).
Globals:
  Function:
    Runtime: python3.12
    Architectures:
    - x86_64
    MemorySize: 128
Resources:
  AgentSpace:
    Type: AWS::DevOpsAgent::AgentSpace
    Properties:
      Name:
        Fn::Sub: devops-agent-${AWS::StackName}
      Description: DevOps Agent Space for automated S3 upload error investigation
  WebhookCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name:
        Fn::Sub: devops-agent-webhook-${AWS::StackName}
      Description: DevOps Agent Generic Webhook credentials. Update after Step 2 (console
        setup).
      SecretString: '{"webhook_url":"PLACEHOLDER","webhook_secret":"PLACEHOLDER"}'
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  S3UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: s3-upload-function
      Handler: lambda_function.handler
      CodeUri: S3UploadFunction
      Timeout: 30
      Description: Uploads a file to S3 when ENABLE_UPLOAD=true, otherwise outputs
        LOG-ERROR.
      Environment:
        Variables:
          ENABLE_UPLOAD:
            Ref: EnableUpload
          S3_BUCKET_NAME:
            Ref: UploadBucket
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: UploadBucket
    Metadata:
      SamResourceId: S3UploadFunction
  S3UploadFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${S3UploadFunction}
      RetentionInDays: 30
  LogErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName:
        Ref: S3UploadFunctionLogGroup
      FilterName: LogErrorFilter
      FilterPattern: '%LOG-ERROR%'
      MetricTransformations:
      - MetricName: LambdaLogErrorCount
        MetricNamespace: DevOpsAgent/Lambda
        MetricValue: '1'
        DefaultValue: 0
  LogErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: s3-upload-function-log-error
      AlarmDescription: LOG-ERROR detected in s3-upload-function
      Namespace: DevOpsAgent/Lambda
      MetricName: LambdaLogErrorCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
  AlarmToInvestigationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: cloudwatch-alarm-to-investigation
      Description: Trigger DevOps Agent investigation when CloudWatch alarm fires
      EventPattern:
        source:
        - aws.cloudwatch
        detail-type:
        - CloudWatch Alarm State Change
        detail:
          state:
            value:
            - ALARM
          alarmName:
          - Ref: LogErrorAlarm
      State: ENABLED
      Targets:
      - Arn:
          Fn::GetAtt:
          - InvestigationTriggerFunction
          - Arn
        Id: InvestigationTrigger
  InvestigationTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: devops-agent-investigation-trigger
      Handler: devops_agent_trigger.handler
      CodeUri: InvestigationTriggerFunction
      Timeout: 60
      Description: Extracts failed file_name from logs and posts to DevOps Agent webhook.
      Environment:
        Variables:
          WEBHOOK_SECRET_ARN:
            Ref: WebhookCredentialsSecret
          LOG_GROUP_NAME:
            Fn::Sub: /aws/lambda/s3-upload-function
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - logs:StartQuery
          - logs:GetQueryResults
          - logs:StopQuery
          Resource: '*'
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource:
            Ref: WebhookCredentialsSecret
    Metadata:
      SamResourceId: InvestigationTriggerFunction
  InvestigationTriggerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/${InvestigationTriggerFunction}
      RetentionInDays: 30
  InvestigationTriggerFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: InvestigationTriggerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn:
        Fn::GetAtt:
        - AlarmToInvestigationRule
        - Arn
Outputs:
  AgentSpaceId:
    Description: "DevOps Agent Space ID \u2014 use when creating webhook in console"
    Value:
      Fn::GetAtt:
      - AgentSpace
      - AgentSpaceId
  WebhookCredentialsSecretArn:
    Description: "Secrets Manager ARN \u2014 update with webhook_url and webhook_secret\
      \ after console setup"
    Value:
      Ref: WebhookCredentialsSecret
  UploadBucketName:
    Description: S3 bucket name for uploads
    Value:
      Ref: UploadBucket
  S3UploadFunctionName:
    Description: S3 upload Lambda name
    Value:
      Ref: S3UploadFunction
  InvestigationTriggerFunctionArn:
    Description: Investigation trigger Lambda ARN
    Value:
      Fn::GetAtt:
      - InvestigationTriggerFunction
      - Arn
